name: Fetch OKX Price
on:
  workflow_dispatch:
  schedule:
    - cron: '* * * * *'
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests -q
      - run: python3 scripts/price_bot.py
