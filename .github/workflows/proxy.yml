name: Remote Browser Proxy
on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to fetch"
        required: true
        type: string
      method:
        description: "HTTP method"
        required: false
        default: "GET"
      body:
        description: "Request body JSON"
        required: false
        type: string
      headers_json:
        description: "Extra headers JSON"
        required: false
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      http_code: ${{ steps.run.outputs.http_code }}
      body: ${{ steps.run.outputs.body }}
    steps:
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Fetch URL
        id: run
        run: |
          set -e
          
          URL="${{ github.event.inputs.url }}"
          METHOD="${{ github.event.inputs.method }}"
          BODY="${{ github.event.inputs.body }}"
          HDRS="${{ github.event.inputs.headers_json }}"
          
          echo "URL=$URL"
          
          # Build header args
          EXTRA_HDRS=""
          if [ -n "$HDRS" ] && [ "$HDRS" != "null" ]; then
            EXTRA_HDRS=$(echo "$HDRS" | jq -r 'to_entries|map("-H \"\\(.key): \\(.value)\"")|.[]' 2>/dev/null || echo "")
          fi
          
          # Fetch
          if [ "$METHOD" = "POST" ]; then
            RESPONSE=$(curl -s -X POST \
              -H "Content-Type: application/json" \
              $EXTRA_HDRS \
              -d "$BODY" \
              -w "\nHTTP_STATUS:%{http_code}" \
              "$URL" 2>&1)
          else
            RESPONSE=$(curl -s -L \
              $EXTRA_HDRS \
              -w "\nHTTP_STATUS:%{http_code}" \
              "$URL" 2>&1)
          fi
          
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | tail -1 | sed 's/HTTP_STATUS://')
          BODY_DATA=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          echo "body<<EOFPOST" >> "$GITHUB_OUTPUT"
          echo "$BODY_DATA" >> "$GITHUB_OUTPUT"
          echo "EOFPOST" >> "$GITHUB_OUTPUT"
          
          echo "HTTP_CODE=$HTTP_CODE"
          echo "BODY_START"
          echo "$BODY_DATA"
          echo "BODY_END"
